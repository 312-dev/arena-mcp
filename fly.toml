app = "arena-mcp"
primary_region = "ord"

[build]

[env]
  MCP_HTTP = "1"
  PORT = "8080"
  STYLE_JOURNAL_SLUG = "style-journal"
  STYLE_DIRECTIVES_SLUG = "style-directives"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
